<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Copa do Heitor - 2 Anos!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      background-color: #0B1C2E; /* Azul Marinho */
      color: #333;
      padding: 10px; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .container { 
      width: 100%; 
      max-width: 420px; 
      background: #ffffff; 
      padding: 30px 22px; 
      border-radius: 20px; 
      border: 4px solid #FFD700; /* Dourado */
      box-shadow: 0 12px 24px rgba(0,0,0,0.4); 
    }

    /* Ícones e Emojis Maiores no Topo */
    .header-icon {
      font-size: 55px;
      margin-bottom: 10px;
      display: block;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    h1 { color: #0B1C2E; font-size: 26px; margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }
    h2 { color: #28a745; font-size: 20px; margin-bottom: 20px; font-weight: 700; } 
    p { font-size: 15px; color: #555; line-height: 1.4; }
    
    /* GRID DE INFORMAÇÕES DECORATIVAS (ÍCONES MAIORES) */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 22px 0 10px 0;
    }
    
    .info-card {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    
    .card-icon {
      font-size: 36px; /* Ícones bem grandes preenchendo o espaço */
    }
    
    .card-text {
      font-size: 12px;
      font-weight: bold;
      color: #0B1C2E;
      line-height: 1.3;
    }
    
    canvas { 
      width: 100%; 
      max-height: 380px;
      object-fit: contain;
      border-radius: 12px; 
      margin-top: 15px; 
      background-color: #f1f3f5; 
      border: 2px dashed #ccc;
    }
    
    /* Botões otimizados para Dedos no Smartphone */
    button { 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #28a745; 
      color: white; 
      border: none; 
      padding: 18px 15px; 
      margin-top: 18px; 
      border-radius: 14px; 
      cursor: pointer; 
      font-size: 20px; 
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s ease, background 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled { 
      background: #cccccc; 
      color: #666;
      cursor: not-allowed; 
      box-shadow: none;
      transform: none;
    }

    #btnRetake { background: #dc3545; } 
    #btnSave { background: #FFD700; color: #0B1C2E; font-size: 21px; }
    
    .hidden { display: none !important; }
    
    /* Termos de Uso */
    #terms { 
      margin: 20px 0; 
      text-align: left; 
      font-size: 15px; 
      background: #f8f9fa;
      padding: 16px;
      border-radius: 12px;
      border-left: 5px solid #FFD700;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }

    #terms label { 
      display: flex; 
      align-items: flex-start; 
      gap: 12px; 
      cursor: pointer; 
      line-height: 1.4;
      color: #222;
    }

    #terms input { 
      margin-top: 2px; 
      transform: scale(1.5); 
      min-width: 20px;
    }

    #statusMsg { 
      margin-top: 20px; 
      font-size: 18px; 
      font-weight: bold; 
      color: #0B1C2E; 
      background: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
    }

    /* TELA DE LOADING EM TELA CHEIA (OVERLAY) */
    #loadingOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(11, 28, 46, 0.95); 
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .spinner {
      border: 6px solid rgba(255, 215, 0, 0.15);
      border-top: 6px solid #FFD700; 
      border-radius: 50%;
      width: 65px;
      height: 65px;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    .loading-text {
      font-size: 22px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 10px;
    }

    .loading-subtext {
      font-size: 15px;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Enviando pro juiz... ⚽⏳</div>
    <div class="loading-subtext">Não feche esta página!</div>
  </div>

  <div class="container" id="step1">
    <span class="header-icon">🏆</span>
    <h1>Copa do Heitor</h1>
    <h2>2 Anos</h2>
    <p>Vamos registrar os melhores lances dessa festa!</p>
    
    <div class="info-grid">
      <div class="info-card">
        <span class="card-icon">🎈</span>
        <span class="card-text">2 aninhos Heitor</span>
      </div>
      <div class="info-card">
        <span class="card-icon">🥳</span>
        <span class="card-text">Aproveite a festa</span>
      </div>
      <div class="info-card">
        <span class="card-icon">📲</span>
        <span class="card-text">Não esqueça de postar muito</span>
      </div>
      <div class="info-card">
        <span class="card-icon">📅</span>
        <span class="card-text">11/07/2026</span>
      </div>
    </div>
    
    <div id="terms">
      <label>
        <input type="checkbox" id="acceptCheckbox">
        <span>Aceito ceder meus direitos de imagem e permito o armazenamento desta foto no álbum da festa.</span>
      </label>
    </div>
    
    <input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden">
    
    <button id="btnStart" disabled><span style="font-size:24px;">📸</span> Abrir Câmera</button>
  </div>

  <div class="container hidden" id="step2">
    <span class="header-icon">📸</span>
    <h1>Copa do Heitor</h1>
    <h2>Ficou boa?</h2>
    <canvas id="canvas"></canvas>
    <button id="btnSave">Salvar no Álbum <span>⚽</span></button>
    <button id="btnRetake">Tentar Novamente</button>
    <p id="statusMsg" class="hidden"></p>
  </div>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhQBv3b79XBvKlnERf441kwzbdIqaYYGDrDld-kOPWGszS5gOTH5PH4Vng6nSlhH0/exec";

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const acceptCheckbox = document.getElementById('acceptCheckbox');
    const btnStart = document.getElementById('btnStart');
    const cameraInput = document.getElementById('cameraInput');
    const btnRetake = document.getElementById('btnRetake');
    const btnSave = document.getElementById('btnSave');
    const statusMsg = document.getElementById('statusMsg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadingOverlay = document.getElementById('loadingOverlay');

    acceptCheckbox.addEventListener('change', (e) => {
      btnStart.disabled = !e.target.checked;
    });

    btnStart.addEventListener('click', () => {
      cameraInput.click();
    });

    cameraInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        loadingOverlay.classList.remove('hidden'); 
        
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            const maxDimension = 1200; 
            let width = img.width;
            let height = img.height;

            if (width > height && width > maxDimension) {
              height *= maxDimension / width;
              width = maxDimension;
            } else if (height > maxDimension) {
              width *= maxDimension / height;
              height = maxDimension;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            statusMsg.classList.add('hidden');
            statusMsg.innerText = "";
            
            loadingOverlay.classList.add('hidden'); 
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    btnRetake.addEventListener('click', () => {
      cameraInput.value = ''; 
      cameraInput.click(); 
      statusMsg.classList.add('hidden');
      statusMsg.innerText = "";
      btnSave.style.display = 'flex';
      btnSave.disabled = false;
      btnSave.innerHTML = "Salvar no Álbum <span>⚽</span>";
    });

    btnSave.addEventListener('click', () => {
      btnSave.disabled = true;
      loadingOverlay.classList.remove('hidden'); 
      
      const base64Data = canvas.toDataURL('image/jpeg', 0.75); 

      fetch(APP_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', 
        body: JSON.stringify({ image: base64Data })
      })
      .then(() => {
        loadingOverlay.classList.add('hidden'); 
        
        statusMsg.classList.remove('hidden');
        statusMsg.style.color = "#28a745";
        statusMsg.innerText = "Golaço! Foto enviada para o álbum.";
        btnSave.style.display = 'none';
        btnRetake.innerText = "Tirar outra foto";
      })
      .catch((err) => {
        loadingOverlay.classList.add('hidden'); 
        
        statusMsg.classList.remove('hidden');
        statusMsg.style.color = "#dc3545";
        statusMsg.innerText = "Erro ao enviar: " + err.message;
        btnSave.disabled = false;
        btnSave.innerHTML = "Tentar Salvar Novamente";
      });
    });
  </script>
</body>
</html>
